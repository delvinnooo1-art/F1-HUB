<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Live Timing F1 - Ice Electric</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background: #050d1a;
      color: #cffafe;
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 {
      margin: 1.5em 0 1em;
      color: #00ffd0;
      text-shadow: 0 0 18px #00fff7, 0 0 24px #098cff;
      font-size: 2.2em;
      letter-spacing: 2px;
      font-weight: 700;
      text-align: center;
    }
    .ice-table-container {
      width: 95vw;
      max-width: 600px;
      background: rgba(0,31,63,0.25);
      backdrop-filter: blur(2px);
      border-radius: 16px;
      padding: 1.5em 0.5em;
      box-shadow: 0 0 25px 0 #00ffd0aa;
      margin-bottom: 2em;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 0;
      min-width: 340px;
    }
    th, td {
      padding: 0.85em 0.4em;
      text-align: center;
    }
    th {
      background: rgba(0,255,240,0.1);
      color: #cffafe;
      font-size: 1.06em;
      letter-spacing: 1.5px;
      border-bottom: 2px solid #00ffd0;
      text-shadow: 0 0 8px #00fff7;
    }
    td {
      color: #ddfaff;
      background: rgba(11,32,53,0.29);
      font-size: 1.07em;
      border-bottom: 1px solid #0922597a;
      transition: text-shadow 0.5s, color 0.5s;
    }
    tr:last-child td {
      border-bottom: none;
    }

    /* Glow effect on update */
    .glow {
      color: #fff !important;
      text-shadow:
        0 0 20px #00fff7,
        0 0 8px #70dcff,
        0 0 2px #009fd0;
      transition: text-shadow 0.2s, color 0.2s;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .ice-table-container {
        max-width: 100vw;
        padding: 0.5em 0.2em;
      }
      h1 {
        font-size: 1.4em;
        margin-top: 1em;
      }
      th, td {
        padding: 0.55em 0.1em;
        font-size: 0.96em;
      }
    }
  </style>
</head>
<body>
  <h1>Live Timing F1 <span style="font-size:0.8em; display:block; color:#11ffe1;">Ice Electric</span></h1>
  <div class="ice-table-container">
    <table id="timingTable">
      <thead>
        <tr>
          <th>Posisi</th>
          <th>Nomor Driver</th>
          <th>Kode Driver</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td colspan="3" style="color:#888;text-align:center;">Memuat data...</td>
        </tr>
      </tbody>
    </table>
  </div>

  <script>
    const API_BASE = 'https://api.openf1.org/v1/position?session_key=latest';

    // Helper: get or default
    function safe(val, def = '') { return (val !== undefined && val !== null) ? val : def; }

    async function fetchLiveTiming() {
      try {
        const resp = await fetch(API_BASE);
        if (!resp.ok) throw new Error("Gagal mengambil data: " + resp.status);
        const data = await resp.json();

        // Sort ascending by 'position' (nilai numerik terkecil = posisi 1)
        data.sort((a, b) => safe(a.position, 100) - safe(b.position, 100));

        // Only unique positions (first per driver_number)
        const seen = new Set();
        const rows = [];
        for (const item of data) {
          const drvNum = safe(item.driver_number);
          // skip if duplicate (in same frame driver can appear several times)
          if (seen.has(drvNum)) continue;
          seen.add(drvNum);
          rows.push({
            position: safe(item.position, "-"),
            number: drvNum || "-",
            code: safe(item.driver_code, "-")
          });
        }

        updateTable(rows);
      } catch (e) {
        // Error fallback
        const tbody = document.querySelector("#timingTable tbody");
        tbody.innerHTML = `<tr><td colspan="3" style="color:#c00;text-align:center;">Gagal memuat data!</td></tr>`;
      }
    }

    // Glow updater
    let prevRows = [];
    function updateTable(rows) {
      const tbody = document.querySelector("#timingTable tbody");
      tbody.innerHTML = "";

      rows.forEach((row, i) => {
        const tr = document.createElement("tr");
        // For each column
        ['position','number','code'].forEach((col, ci) => {
          const td = document.createElement("td");
          td.textContent = row[col];
          // Add glow only if value changed since last render
          if (!prevRows[i] || prevRows[i][col] !== row[col]) {
            td.classList.add('glow');
            setTimeout(() => td.classList.remove('glow'), 780); // Remove glow after ~0.8s
          }
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });

      prevRows = rows.map(r => ({...r}));
    }

    // Poll every 2 seconds
    fetchLiveTiming();
    setInterval(fetchLiveTiming, 2000);
  </script>
</body>
</html>
